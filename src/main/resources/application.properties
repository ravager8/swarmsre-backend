spring.application.name=swarmsre-backend
server.port=8080

# Azure OpenAI Configuration (For the AI Swarm)
spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY:mock-key}
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:https://mock.openai.azure.com/}
spring.ai.azure.openai.chat.options.model=gpt-4o
spring.ai.azure.openai.chat.options.temperature=0.2

# Azure Cosmos DB Configuration (For Memory & Logs)
spring.cloud.azure.cosmos.endpoint=${COSMOS_DB_ENDPOINT:https://mock.documents.azure.com:443/}
spring.cloud.azure.cosmos.key=${COSMOS_DB_KEY:mock-key}
spring.cloud.azure.cosmos.database=SwarmSREDB