spring.application.name=swarmsre-backend
server.port=8080

# Azure OpenAI Configuration (For the AI Swarm)
# --- Azure OpenAI Configuration (Hardcoded for local dev) ---
spring.ai.azure.openai.api-key=dummy-key-for-local-dev
spring.ai.azure.openai.endpoint=https://dummy.openai.azure.com/
spring.ai.azure.openai.chat.options.model=gpt-4o
spring.ai.azure.openai.chat.options.temperature=0.2

# Disable Cosmos DB auto-configuration while using H2
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.cosmosdb.autoconfigure.CosmosDBVectorStoreAutoConfiguration,org.springframework.ai.model.chat.memory.repository.cosmosdb.autoconfigure.CosmosDBChatMemoryRepositoryAutoConfiguration,org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration

# --- H2 In-Memory Database (Active) ---
spring.datasource.url=jdbc:h2:mem:swarmdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Enables the web UI at http://localhost:8080/h2-console
spring.h2.console.enabled=true 

